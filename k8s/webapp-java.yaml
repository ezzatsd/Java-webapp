apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-java
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webapp-java
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webapp-java
    spec:
      containers:
        - name: webapp-java
          image: webapp-java:6
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-java
  namespace: devops
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: webapp-java
  ports:
    - name: http
      port: 80
      targetPort: http
